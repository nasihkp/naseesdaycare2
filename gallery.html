<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Nasees Love & Learn Daycare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="navbar">
            <a href="index.html" class="logo-container">
                <img src="logo.png" alt="Nasees Daycare Logo" class="logo-img" onerror="this.src='https://placehold.co/100x100/0f8b4c/ffffff?text=Logo'">
                <div class="logo-text">Nasees <span>Love & Learn</span></div>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="programs.html">Programs</a></li>
                <li><a href="facilities.html">Facilities</a></li>
                <li><a href="gallery.html" class="active">Gallery</a></li>
                <li><a href="admissions.html" class="btn btn-primary" style="color: white;">Admissions</a></li>
            </ul>
            <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <section class="hero" style="padding: 80px 0 100px; text-align: center;">
        <div class="container">
            <h1>Our <span>Gallery</span></h1>
            <p>Glimpses of joy, learning, and fun at Nasees.</p>
        </div>
    </section>

    <section class="section-padding bg-white">
        <div class="container">
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="hero_children.png" alt="Children playing">
                    <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                </div>
                <div class="gallery-item">
                    <img src="about_teachers.png" alt="Teachers and kids">
                    <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                </div>
                <div class="gallery-item">
                    <img src="activities_art.png" alt="Art activities">
                    <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                </div>
                <!-- Placeholder images for visual completeness -->
                <div class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1587691592099-24045742c181?q=80&w=600&auto=format&fit=crop" alt="Classroom">
                    <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                </div>
                <div class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1516627145497-ae6968895b74?q=80&w=600&auto=format&fit=crop" alt="Learning">
                    <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                </div>
                <div class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1537655780520-1e392ead81f2?q=80&w=600&auto=format&fit=crop" alt="Playing">
                    <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container text-center">
            <div class="copyright">&copy; <span id="year"></span> Nasees Love & Learn Daycare.</div>
        </div>
    </footer>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
        const navLinks = document.querySelector('.nav-links');
        if(mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => { navLinks.classList.toggle('active'); });
        }
    </script>
</body>
</html>
